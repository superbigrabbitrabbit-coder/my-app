!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熊大先生 × 誰最了解熊大</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* ── Reset ── */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── Variables ── */
        :root {
            --brown: #6B3F1E;
            --brown-light: #A0673A;
            --cream: #FFF8EF;
            --warm-yellow: #FFD97D;
            --blush: #FFB3C6;
            --soft-white: #FFF0E0;
            --deep-brown: #3D2009;
            --shadow: rgba(107, 63, 30, 0.15);
        }

        /* ── Base ── */
        body {
            font-family: 'Noto Sans TC', 'Nunito', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px var(--shadow);
            padding-bottom: 50px;
        }

        header {
            background: linear-gradient(135deg, var(--brown) 0%, var(--brown-light) 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .bear-avatar {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .card {
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            background: var(--soft-white);
            border: 2px solid var(--warm-yellow);
        }

        .choice-btn {
            display: block;
            width: calc(100% - 40px);
            margin: 10px 20px;
            padding: 15px;
            border: 2px solid var(--brown);
            border-radius: 15px;
            background: white;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--deep-brown);
            cursor: pointer;
            transition: all 0.2s;
        }

        .choice-btn:hover {
            background: var(--warm-yellow);
        }

        #result {
            display: none;
            margin: 20px;
            padding: 20px;
            background: var(--blush);
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="bear-avatar">🐻</div>
            <h1>誰最了解熊大？</h1>
            <p>測試你的粉絲等級！</p>
        </header>

        <div class="card">
            <p>請問：熊大最喜歡的人是誰？</p>
        </div>

        <button class="choice-btn" onclick="showResult('答對了！你果然是超級粉絲！')">A. 兔兔 (Cony)</button>
        <button class="choice-btn" onclick="showResult('哎呀，那是他的好朋友啦～')">B. 莎莉 (Sally)</button>
        <button class="choice-btn" onclick="showResult('雖然很帥，但不是喔！')">C. 詹姆士 (James)</button>

        <div id="result"></div>
    </div>

    <script>
        function showResult(msg) {
            const resDiv = document.getElementById('result');
            resDiv.style.display = 'block';
            resDiv.innerHTML = '✨ ' + msg;
            resDiv.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
