<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>熊大先生 × 誰最了解熊大</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --brown: #6B3F1E;
    --brown-light: #A0673A;
    --cream: #FFF8EF;
    --warm-yellow: #FFD97D;
    --blush: #FFB3C6;
    --soft-white: #FFF0E0;
    --cony-white: #F5F0EB;
    --deep-brown: #3D2009;
    --toast: #E8A855;
    --coffee: #4A2C12;
    --green-leaf: #8BC34A;
    --shadow: rgba(107,63,30,0.15);
  }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘Noto Sans TC’, ‘Nunito’, sans-serif;
background: var(–cream);
min-height: 100vh;
overflow-x: hidden;
position: relative;
}

/* Floating paws background */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image:
radial-gradient(ellipse at 20% 20%, rgba(255,217,125,0.18) 0%, transparent 60%),
radial-gradient(ellipse at 80% 80%, rgba(255,179,198,0.15) 0%, transparent 55%),
radial-gradient(ellipse at 60% 10%, rgba(160,103,58,0.07) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

/* Paw print decorations */
.paw-bg {
position: fixed;
inset: 0;
pointer-events: none;
z-index: 0;
overflow: hidden;
}
.paw {
position: absolute;
font-size: 1.5rem;
opacity: 0.07;
animation: floatPaw 8s infinite ease-in-out;
}
@keyframes floatPaw {
0%,100% { transform: translateY(0) rotate(0deg); }
50% { transform: translateY(-14px) rotate(12deg); }
}

/* ── HEADER ── */
header {
position: relative;
z-index: 10;
background: linear-gradient(135deg, var(–brown) 0%, var(–brown-light) 100%);
padding: 0;
overflow: hidden;
}
.header-inner {
max-width: 900px;
margin: 0 auto;
padding: 36px 24px 28px;
display: flex;
align-items: center;
gap: 24px;
}
.bear-avatar {
width: 96px;
height: 96px;
border-radius: 50%;
background: var(–deep-brown);
border: 4px solid var(–warm-yellow);
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
font-size: 3.6rem;
box-shadow: 0 6px 24px rgba(0,0,0,0.25);
animation: bearBounce 3s ease-in-out infinite;
}
@keyframes bearBounce {
0%,100% { transform: translateY(0); }
50% { transform: translateY(-6px); }
}
.header-text { color: #fff; }
.header-tag {
display: inline-block;
background: var(–warm-yellow);
color: var(–deep-brown);
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 0.7rem;
letter-spacing: 0.12em;
text-transform: uppercase;
padding: 3px 10px;
border-radius: 20px;
margin-bottom: 8px;
}
.header-title {
font-size: clamp(1.5rem, 4vw, 2.2rem);
font-weight: 900;
line-height: 1.2;
text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header-sub {
font-size: 0.85rem;
opacity: 0.8;
margin-top: 4px;
}
.header-wave {
width: 100%;
display: block;
margin-bottom: -2px;
}

/* ── MAIN ── */
main {
position: relative;
z-index: 5;
max-width: 860px;
margin: 0 auto;
padding: 0 20px 60px;
}

/* Story card */
.story-card {
background: #fff;
border-radius: 28px;
padding: 32px 28px;
margin-top: -8px;
box-shadow: 0 8px 40px var(–shadow);
position: relative;
overflow: hidden;
}
.story-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 5px;
background: linear-gradient(90deg, var(–warm-yellow), var(–blush), var(–toast));
}
.story-label {
font-size: 0.72rem;
font-weight: 700;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–brown-light);
margin-bottom: 12px;
}
.story-text {
font-size: 1.05rem;
color: #3a2a1a;
line-height: 1.85;
font-weight: 500;
}
.story-text em {
font-style: normal;
color: var(–brown);
font-weight: 700;
}

/* Image strip */
.img-strip {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 14px;
margin: 24px 0;
}
.img-strip img {
width: 100%;
aspect-ratio: 1;
object-fit: cover;
border-radius: 18px;
border: 3px solid var(–cream);
box-shadow: 0 4px 16px var(–shadow);
transition: transform 0.3s ease, box-shadow 0.3s ease;
cursor: pointer;
}
.img-strip img:hover {
transform: scale(1.04) rotate(-1deg);
box-shadow: 0 8px 28px var(–shadow);
}

/* ── POLL SECTION ── */
.poll-section {
margin-top: 28px;
}
.poll-title {
font-size: clamp(1.3rem, 3vw, 1.7rem);
font-weight: 900;
color: var(–deep-brown);
margin-bottom: 6px;
display: flex;
align-items: center;
gap: 10px;
}
.poll-title .badge {
background: var(–blush);
border-radius: 50%;
width: 38px;
height: 38px;
display: flex;
align-items: center;
justify-content: center;
font-size: 1.4rem;
flex-shrink: 0;
}
.poll-sub {
color: #7a5a3a;
font-size: 0.9rem;
margin-bottom: 22px;
line-height: 1.6;
}

/* Choices */
.choices { display: flex; flex-direction: column; gap: 14px; }
.choice-btn {
background: var(–soft-white);
border: 2.5px solid transparent;
border-radius: 20px;
padding: 18px 22px;
display: flex;
align-items: center;
gap: 16px;
cursor: pointer;
transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
text-align: left;
font-family: ‘Noto Sans TC’, sans-serif;
position: relative;
overflow: hidden;
}
.choice-btn::before {
content: ‘’;
position: absolute;
inset: 0;
background: linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.5));
pointer-events: none;
}
.choice-btn:hover {
transform: translateY(-3px) scale(1.01);
box-shadow: 0 8px 24px var(–shadow);
}
.choice-btn.selected {
border-color: var(–brown);
background: var(–cream);
box-shadow: 0 6px 20px rgba(107,63,30,0.2);
transform: scale(1.01);
}
.choice-btn.choice-a { border-color: rgba(239,83,80,0.2); }
.choice-btn.choice-a:hover, .choice-btn.choice-a.selected {
border-color: #EF5350;
background: #fff5f5;
}
.choice-btn.choice-b { border-color: rgba(236,64,122,0.2); }
.choice-btn.choice-b:hover, .choice-btn.choice-b.selected {
border-color: #EC407A;
background: #fff0f6;
}
.choice-btn.choice-c { border-color: rgba(102,187,106,0.2); }
.choice-btn.choice-c:hover, .choice-btn.choice-c.selected {
border-color: #66BB6A;
background: #f2fff2;
}

.choice-letter {
width: 44px;
height: 44px;
border-radius: 50%;
font-family: ‘Nunito’, sans-serif;
font-size: 1.2rem;
font-weight: 900;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
color: #fff;
}
.choice-a .choice-letter { background: #EF5350; }
.choice-b .choice-letter { background: #EC407A; }
.choice-c .choice-letter { background: #66BB6A; }

.choice-content { flex: 1; }
.choice-text {
font-size: 1rem;
font-weight: 700;
color: var(–deep-brown);
line-height: 1.4;
}
.choice-sub {
font-size: 0.78rem;
color: #9a7a5a;
margin-top: 2px;
}
.choice-emoji { font-size: 1.6rem; }

/* Progress bar (shown after vote) */
.progress-bar-wrap {
display: none;
margin-top: 8px;
height: 7px;
background: rgba(0,0,0,0.07);
border-radius: 10px;
overflow: hidden;
}
.progress-bar {
height: 100%;
border-radius: 10px;
transition: width 1.2s cubic-bezier(0.22,1,0.36,1);
width: 0%;
}
.choice-a .progress-bar { background: #EF5350; }
.choice-b .progress-bar { background: #EC407A; }
.choice-c .progress-bar { background: #66BB6A; }
.progress-count {
font-size: 0.75rem;
font-weight: 700;
color: #7a5a3a;
margin-top: 4px;
display: none;
}

/* Submit */
.submit-area {
margin-top: 24px;
display: flex;
flex-direction: column;
align-items: center;
gap: 12px;
}
.submit-btn {
background: linear-gradient(135deg, var(–brown) 0%, var(–brown-light) 100%);
color: #fff;
border: none;
border-radius: 50px;
padding: 16px 48px;
font-family: ‘Nunito’, sans-serif;
font-size: 1.1rem;
font-weight: 800;
cursor: pointer;
box-shadow: 0 6px 20px rgba(107,63,30,0.35);
transition: all 0.2s ease;
letter-spacing: 0.03em;
}
.submit-btn:hover:not(:disabled) {
transform: translateY(-3px);
box-shadow: 0 10px 28px rgba(107,63,30,0.45);
}
.submit-btn:disabled {
opacity: 0.5;
cursor: default;
}
.hint-text {
font-size: 0.8rem;
color: #b08060;
}

/* Result bubble */
.result-bubble {
display: none;
background: linear-gradient(135deg, var(–warm-yellow) 0%, #FFE9A0 100%);
border-radius: 24px;
padding: 28px 24px;
margin-top: 24px;
text-align: center;
box-shadow: 0 6px 24px rgba(200,150,0,0.2);
animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
0% { transform: scale(0.7); opacity: 0; }
100% { transform: scale(1); opacity: 1; }
}
.result-bear { font-size: 3rem; margin-bottom: 8px; }
.result-title {
font-size: 1.2rem;
font-weight: 900;
color: var(–deep-brown);
margin-bottom: 6px;
}
.result-msg { font-size: 0.92rem; color: #6a4a1a; line-height: 1.6; }

/* Comments */
.comments-section {
margin-top: 36px;
background: #fff;
border-radius: 28px;
padding: 28px 24px;
box-shadow: 0 6px 32px var(–shadow);
}
.comments-header {
font-size: 1.1rem;
font-weight: 800;
color: var(–deep-brown);
margin-bottom: 18px;
display: flex;
align-items: center;
gap: 8px;
}
.comment-input-row {
display: flex;
gap: 10px;
margin-bottom: 20px;
}
.comment-avatar {
width: 40px;
height: 40px;
border-radius: 50%;
background: var(–brown);
display: flex;
align-items: center;
justify-content: center;
font-size: 1.4rem;
flex-shrink: 0;
border: 2px solid var(–warm-yellow);
}
.comment-input {
flex: 1;
border: 2px solid #e8d8c8;
border-radius: 20px;
padding: 10px 16px;
font-family: ‘Noto Sans TC’, sans-serif;
font-size: 0.9rem;
color: var(–deep-brown);
outline: none;
resize: none;
background: var(–cream);
transition: border-color 0.2s;
min-height: 44px;
}
.comment-input:focus { border-color: var(–brown-light); }
.comment-send {
background: var(–brown);
color: #fff;
border: none;
border-radius: 50%;
width: 44px;
height: 44px;
font-size: 1.2rem;
cursor: pointer;
flex-shrink: 0;
transition: background 0.2s, transform 0.2s;
align-self: flex-end;
}
.comment-send:hover { background: var(–deep-brown); transform: scale(1.08); }

.comments-list { display: flex; flex-direction: column; gap: 14px; }
.comment-item {
display: flex;
gap: 10px;
animation: slideIn 0.4s ease;
}
@keyframes slideIn {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
.comment-icon {
width: 36px;
height: 36px;
border-radius: 5
