<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熊大先生 × 誰最了解熊大</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* 這裡保留你原本精美的 CSS 樣式 */
    :root {
      --brown: #6B3F1E; --brown-light: #A0673A; --cream: #FFF8EF;
      --warm-yellow: #FFD97D; --blush: #FFB3C6; --soft-white: #FFF0E0;
      --deep-brown: #3D2009; --shadow: rgba(107,63,30,0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); display: flex; justify-content: center; }
    .container { width: 100%; max-width: 500px; background: white; min-height: 100vh; box-shadow: 0 0 20px var(--shadow); }
    header { background: linear-gradient(135deg, var(--brown), var(--brown-light)); color: white; padding: 40px 20px; text-align: center; }
    .card { margin: 20px; padding: 20px; border-radius: 20px; background: var(--soft-white); border: 2px solid var(--warm-yellow); line-height: 1.6; }
    .choice-btn { display: block; width: calc(100% - 40px); margin: 10px 20px; padding: 15px; border: 2px solid var(--brown); border-radius: 15px; background: white; font-weight: bold; cursor: pointer; text-align: left; transition: 0.2s; }
    .choice-btn:hover { background: var(--soft-white); }
    .choice-btn.selected { background: var(--warm-yellow); border-color: var(--brown); }
    .submit-btn { width: calc(100% - 40px); margin: 10px 20px; padding: 15px; border: none; border-radius: 15px; background: var(--brown); color: white; font-weight: bold; cursor: pointer; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #result { display: none; margin: 20px; padding: 20px; background: var(--blush); border-radius: 20px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>🐻 熊大先生官方粉絲頁</h1>
    <p>陪你過每一個特別的早晨</p>
  </header>

  <div class="card">
    熊大準備了一份特別的早餐！裡面藏了一個只有兔兔才懂的小秘密？💖<br>
    大家快來猜猜看，裡面加了什麼料？
  </div>

  <button class="choice-btn" onclick="selectOption(this, 'A')">A. 超辣果醬 🌶️</button>
  <button class="choice-btn" onclick="selectOption(this, 'B')">B. 告白小紙條 💌</button>
  <button class="choice-btn" onclick="selectOption(this, 'C')">C. 黏土做的 🎨</button>

  <button id="submitBtn" class="submit-btn" disabled onclick="submitVote()">送出我的猜測</button>

  <div id="result">
    ✨ 答對了！熊大在荷包蛋下面藏了告白紙條！兔兔超開心的！
  </div>
</div>

<script>
  let selected = null;

  function selectOption(btn, val) {
    // 移除其他按鈕的選取樣式
    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
    // 加入選取樣式
    btn.classList.add('selected');
    selected = val;
    // 啟用提交按鈕
    document.getElementById('submitBtn').disabled = false;
  }

  function submitVote() {
    document.getElementById('result').style.display = 'block';
    document.getElementById('submitBtn').innerText = '已送出成功！';
    document.getElementById('submitBtn').disabled = true;
    alert('感謝投票！');
  }
</script>
</body>
</html>
